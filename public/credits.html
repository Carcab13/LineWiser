<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>LineWiser — Credits</title>
    <link rel="stylesheet" href="index.css" />
    <script src="index.js" defer></script>

    <style>
        body {
            /* LineWiser Signature Glow */
            background: radial-gradient(
                1200px 600px at 50% -20%,
                rgba(138, 180, 248, 0.18),
                transparent 55%
            ), #111;
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: var(--font-main);
            margin: 0;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-center {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-center h1 {
            font-family: var(--font-display);
            font-weight: 400;
            font-size: clamp(32px, 6vw, 52px);
            margin: 0 0 10px 0;
            color: #fff;
        }

        .header-center p {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        .credit-list {
            width: 100%;
            max-width: 450px; /* Narrower for a mobile-app list feel */
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* The Row with Logo + Name */
        .credit-row {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .credit-row:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(138, 180, 248, 0.4);
            transform: translateX(5px); /* Subtle slide effect */
        }

        /* The Small Logo/Icon Spot */
        .project-icon {
            width: 44px;
            height: 44px;
            background: rgba(138, 180, 248, 0.1);
            border: 1px solid rgba(138, 180, 248, 0.2);
            border-radius: 12px; /* Rounded Square */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
            font-weight: 700;
            color: var(--accent-color);
            font-size: 18px;
        }

        .project-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .project-name {
            font-weight: 500;
            font-size: 15px;
            letter-spacing: 0.3px;
            color: var(--text-active);
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 12px;
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        @media (max-width: 600px) {
            .back-btn {
                position: static;
                margin-bottom: 40px;
            }
        }
        /* Container to stack Name and Desc vertically */
.project-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: left; /* Aligns text to the left of the row, but the row itself is centered */
}

.project-name {
    font-weight: 600;
    font-size: 15px;
    color: var(--text-active);
    line-height: 1.2;
}

/* The Subtext (Description) */
.project-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
    opacity: 0.8;
}

/* Optional: Slightly widen the list to fit the subtext better */
.credit-list {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
    </style>
</head>

<body>

    <div class="header-center">
        <h1>Credits</h1>
        <p>Linewiser was made by top-tier open-source projects and developers.</p>
    </div>

    <div class="credit-list">

        <!-- Scramjet Row -->
        <div class="credit-row">
            <div class="project-icon"><img src="./SuprNovaFavicon.png" alt="scramjet"></div> <!-- Replace with <img src="./imgs/scramjet.png"> -->
            <div class="project-info">
              <span class="project-name">SuprNova</span>
              <span class="project-desc">Parent Company | Development</span>
            </div>
        </div>

        <!-- Mercury Row -->
        <div class="credit-row">
            <div class="project-icon"><img src="./percury.svg" alt=""></div> <!-- Replace with <img src="./imgs/mercury.png"> -->
            <div class="project-info">
              <span class="project-name">MercuryWorkshop</span>
              <span class="project-desc">Scramjet proxy</span>
            </div>
        </div>

        <div class="credit-row">
            <div class="project-icon"><img src="./platinum.png" alt=""></div> <!-- Replace with <img src="./imgs/mercury.png"> -->
            <div class="project-info">
              <span class="project-name">Platinum Network</span>
              <span class="project-desc">Partner | Games/Apps</span>
            </div>
        </div>

    </div>

    <footer style="margin-top: 60px; color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 2px;">
        LineWiser &copy; 2026
    </footer>
</body>
</html>
