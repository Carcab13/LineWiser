<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LineWiser — Apps</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="games.css" />
    <script src="/baremux/index.js"></script>
    <script src="/scramjet/scramjet.code.js"></script>
    <script src="/scramjet/scramjet.controller.js"></script>
</head>
<body>
    <main style="padding: 28px; color: var(--text-primary); font-family: var(--font-main);">
        <h1 style="font-family: var(--font-display); font-weight: 400; margin: 0 0 10px 0;">Apps</h1>

        <div class="lw-quick" style="justify-content: flex-start; margin-bottom: 20px; gap: 15px;">
            <!-- SEARCH BAR -->
            <input type="text" id="game-search" placeholder="Search apps..."
                   style="flex: 1; max-width: 400px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 15px; color: white; outline: none; font-family: inherit;">
        </div>

        <div id="game-grid" class="game-grid"></div>
    </main>

    <script>
        // 1. BareMux / Scramjet Connection Logic
        const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
        async function setTransport() {
            await connection.setTransport("/libcurl/index.mjs", [{
                wisp: (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/wisp/"
            }]);
        }
        setTransport();

        // 2. Game Loading & Search Logic
        let allGames = []; // Global variable to store fetched data

        async function fetchGames() {
            try {
                const response = await fetch('apps.json');
                allGames = await response.json();

                // SORT ALPHABETICALLY
                allGames.sort((a, b) => a.name.localeCompare(b.name));

                // Initial Render
                renderGames(allGames);
            } catch (error) {
                console.error("Error loading games:", error);
                document.getElementById('game-grid').innerHTML = "<p>Failed to load games.</p>";
            }
        }

        function renderGames(gamesList) {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = ''; // Clear current grid

            if (gamesList.length === 0) {
                grid.innerHTML = "<p style='color: var(--text-secondary);'>No games found.</p>";
                return;
            }

            gamesList.forEach(game => {
                const card = document.createElement('a');
                // Wraps game URL in proxy prefix
                card.href = '/scramjet/' + encodeURIComponent(game.url);
                card.className = 'game-card';

                const iconDiv = document.createElement('div');
                iconDiv.className = 'game-icon';

                const img = document.createElement('img');
                img.src = game.image;
                img.alt = game.name;
                img.loading = "lazy";

                const name = document.createElement('span');
                name.className = 'game-name';
                name.textContent = game.name;

                iconDiv.appendChild(img);
                card.appendChild(iconDiv);
                card.appendChild(name);
                grid.appendChild(card);
            });
        }

        // 3. Search Bar Event Listener
        document.getElementById('game-search').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredGames = allGames.filter(game =>
                game.name.toLowerCase().includes(searchTerm)
            );
            renderGames(filteredGames);
        });

        document.addEventListener('DOMContentLoaded', fetchGames);
    </script>
</body>
</html>
